<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせフォーム</title>
    <link rel="stylesheet" href="test.css">
</head>
<body>
    <div class="container">
        <header>
            <h2>世界一甘い</h2>
        </header>
    <div class="contents-wrapper">
    <nav>
    <ul>
        <li><a href="#section1">トップ</a></li>
        <li><a href="#section2">新着情報</a></li>
        <li><a href="#section3">おすすめのスイーツ</a></li>
        <li><a href="#section4">お問い合わせ</a></li>
    </ul>
    </nav>
    <form>
        <section id="main">
            <table border="4">
                <tr>
                <th>お名前</th>
                <td><input type="text" size="40"></td>
                </tr>
                <tr>
                    <th>近くのお店</th>
                    <td>
                        <select id="job" name="job">
                            <option value="hokkaido">北海道・東北</option>
                            <option value="kanto">関東</option>
                            <option value="chubu">中部</option>
                            <option value="kansai">関西</option>
                            <option value="shikoku">中国・四国</option>
                            <option value="kyushu">九州・沖縄</option>
                        </select>
                    </td>
                </tr>
                <tr>
                <th>電話番号</th>
                <td><input type="text" size="40"></td>
            </tr>
            <tr>
                <th>メールアドレス</th>
                <td><input type="text" size="40"></td>
            </tr>
            <tr>
                <th>お問い合わせ種別</th>
                <td>
                    <input type="radio" name="type" value="product" id="product">
                    <label for="product">商品について</label>
                    <input type="radio" name="type" value="staff" id="staff">
                    <label for="staff">従業員について</label>
                </td>
            </tr>
            <tr>
                <th>お問い合わせ内容</th>
                <td>
                    <textarea name="content" cols="35" rows="4" placeholder="詳細を入力してください"></textarea>
                </td>
            </tr>
            </table>
            
            <div class="submit-btn">
                <input type="submit" value="送信">
            </div>
        </section>
    </form>
</div> <footer></footer>
</div> 
</body>
</html>
